<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind 互動狀態：Hover & Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 我們可以在這裡添加一些微調，但儘量使用 Tailwind */
    </style>
</head>

<body class="bg-gray-100 p-12 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">聯絡我們</h2>

        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">您的姓名</label>
                <input type="text" placeholder="例如：王小明"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all placeholder:text-gray-300">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件</label>
                <input type="email" placeholder="hello@example.com"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition-all">
                傳送訊息
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-100">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">狀態觀念</h3>
            <div class="space-y-2 text-xs">
                <p><span class="font-mono bg-yellow-100 p-1 rounded">hover:bg-blue-700</span> 滑鼠移入</p>
                <p><span class="font-mono bg-yellow-100 p-1 rounded">focus:ring-4</span> 選取輸入框時 (外框亮起)</p>
                <p><span class="font-mono bg-yellow-100 p-1 rounded">active:scale-95</span> 按下去的瞬間縮小效果</p>
                <p><span class="font-mono bg-yellow-100 p-1 rounded">transition-all</span> 讓狀態變化變平滑</p>
            </div>
        </div>
    </div>

</body>

</html>
