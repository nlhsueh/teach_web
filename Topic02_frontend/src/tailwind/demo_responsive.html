<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind 響應式開發：Mobile First</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

    <!-- Responsive Navbar -->
    <nav class="bg-white shadow-sm p-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="text-xl font-bold text-blue-600 mb-4 md:mb-0">Travel.Go</div>
            <ul class="flex space-x-4 text-gray-600 text-sm md:text-base">
                <li><a href="#" class="hover:text-blue-600">行程</a></li>
                <li><a href="#" class="hover:text-blue-600">住宿</a></li>
                <li><a href="#" class="hover:text-blue-600">租車</a></li>
                <li><a href="#" class="hover:text-blue-600">部落格</a></li>
            </ul>
        </div>
    </nav>

    <div class="p-8 max-w-6xl mx-auto">
        <div class="bg-white p-8 rounded-lg shadow text-center">
            <h1 class="text-2xl md:text-4xl lg:text-5xl font-black text-gray-800 transition-all duration-300">
                響應式標題
            </h1>
            <p class="mt-4 text-gray-500">請嘗試調整瀏覽器寬度</p>

            <div class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-red-50 p-4 rounded border border-red-200 text-red-700">Mobile (預設)</div>
                <div class="bg-blue-50 p-4 rounded border border-blue-200 text-blue-700 md:block hidden">Tablet (md:)
                </div>
                <div class="bg-green-50 p-4 rounded border border-green-200 text-green-700 lg:block hidden">Desktop
                    (lg:)</div>
                <div class="bg-purple-50 p-4 rounded border border-purple-200 text-purple-700 lg:block hidden">Big
                    Screen</div>
            </div>
        </div>

        <div class="mt-8 bg-black text-white p-6 rounded-lg font-mono text-xs md:text-sm">
            <p>// 響應式邏輯</p>
            <p class="text-yellow-400">text-2xl <span class="text-gray-400">(預設：手機)</span></p>
            <p class="text-green-400">md:text-4xl <span class="text-gray-400">(中螢幕：平板)</span></p>
            <p class="text-blue-400">lg:text-5xl <span class="text-gray-400">(大螢幕：桌機)</span></p>
        </div>
    </div>

</body>

</html>
