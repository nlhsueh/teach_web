<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 表單標籤展示</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f7f9fc; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="text"], input[type="email"], input[type="number"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box;
        }
        .radio-group, .checkbox-group { display: flex; gap: 15px; align-items: center; }
        .radio-group label, .checkbox-group label { display: inline; font-weight: normal; margin-left: 5px; }
        input[type="submit"] { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; }
        input[type="submit"]:hover { background: #2980b9; }
        fieldset { border: 2px solid #3498db; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        legend { padding: 0 10px; font-weight: bold; color: #3498db; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>表單展示 (Forms)</h1>
        <form action="#" method="get">
            <fieldset>
                <legend>個人基本資料</legend>
                
                <div class="form-group">
                    <label for="name">姓名 (必填/提示)：</label>
                    <input type="text" id="name" name="name" placeholder="請輸入全名" required maxlength="20">
                </div>

                <div class="form-group">
                    <label>性別 (Radio)：</label>
                    <div class="radio-group">
                        <span><input type="radio" id="m" name="sex" value="m"><label for="m">男</label></span>
                        <span><input type="radio" id="f" name="sex" value="f"><label for="f">女</label></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="height">身高 (Number/範圍)：</label>
                    <input type="number" id="height" name="height" min="100" max="250" step="0.5" value="170">
                </div>
            </fieldset>

            <fieldset>
                <legend>其他偏好</legend>
                
                <div class="form-group">
                    <label>興趣 (Checkbox)：</label>
                    <div class="checkbox-group">
                        <span><input type="checkbox" id="c1" name="hobby" value="code"><label for="c1">寫程式</label></span>
                        <span><input type="checkbox" id="c2" name="hobby" value="music"><label for="c2">聽音樂</label></span>
                        <span><input type="checkbox" id="c3" name="hobby" value="sport"><label for="c3">運動</label></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="role">目前身份 (Select)：</label>
                    <select id="role" name="role">
                        <option value="student">學生</option>
                        <option value="teacher">教師</option>
                        <option value="dev">工程師</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bio">簡介 (Textarea)：</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="請簡單介紹自己..."></textarea>
                </div>
            </fieldset>

            <input type="submit" value="送出測試 (GET)">
        </form>
    </div>
</body>
</html>
